add_newline = false
command_timeout = 1000

format = """
$username[@](#7eb8da)$hostname$cmd_duration${custom.memory}$time$git_branch$git_status$aws$kubernetes$status
$directory
$character"""

# --------------------------------------------------
# USERNAME
# --------------------------------------------------

[username]
show_always = true
style_user = "#7eb8da"
style_root = "#7eb8da"
format = "[îچ°](#7eb8da) [َ°€‰](white) [$user]($style) "

# --------------------------------------------------
# HOSTNAME
# --------------------------------------------------

[hostname]
ssh_only = false
style = "#7eb8da"
format = " [َ°ں€](white) [$hostname]($style) "

# --------------------------------------------------
# EXECUTION TIME
# --------------------------------------------------

[cmd_duration]
min_time = 0
show_milliseconds = false
format = "[ï‰’](white) [$duration](#be9ddf) "

# --------------------------------------------------
# MEMORY
# --------------------------------------------------

[custom.memory]
command = '''
vm_stat | awk '
/Pages active/ {active=$3}
/Pages wired down/ {wired=$4}
/Pages occupied by compressor/ {compressed=$5}
END {
  gsub("\\.","",active);
  gsub("\\.","",wired);
  gsub("\\.","",compressed);

  used=(active+wired+compressed)*4096/1000000000;

  cmd="sysctl -n hw.memsize";
  cmd | getline total;
  close(cmd);

  printf "RAM: %.1f/%.1fGB", used, total/1000000000
}'
'''
when = true
format = "[َ°چ›](white) [$output](#be9ddf) "

# --------------------------------------------------
# TIME
# --------------------------------------------------

[time]
disabled = false
time_format = "%A, %-I:%M:%S %p"
format = "[َ°ƒ°](white) [$time](#7eb8da) "

